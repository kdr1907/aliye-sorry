<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aliye ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:url("image.JPG") center/cover no-repeat;
}


/* Başlangıç */

#startScreen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99;
}


#startBtn{
    padding:22px 45px;
    border:none;
    border-radius:50px;
    font-size:26px;
    font-weight:bold;
    color:#ff4d88;
    background:white;
    cursor:pointer;
    box-shadow:0 0 30px white;
}


/* Ana bölüm */

#mainContent{
    display:none;
    position:fixed;
    inset:0;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}


h1{
    color:white;
    font-size:55px;
    text-align:center;
    margin-bottom:50px;
    text-shadow:3px 3px 15px black;
}


.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
}


button{
    border:none;
    border-radius:20px;
    padding:18px 35px;
    font-size:22px;
    cursor:pointer;
}


#yes{
    background:#2ecc71;
    color:white;
}


#no{
    background:#e74c3c;
    color:white;
}


/* Kalpler */

.heart{
    position:absolute;
    bottom:-50px;
    font-size:30px;
    animation:up 6s linear forwards;
    pointer-events:none;
}


@keyframes up{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}


/* Son ekran */

#result{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    text-align:center;
}


.resultText{
    color:white;
    font-size:30px;
    font-weight:bold;
    text-shadow:3px 3px 15px black;
}



@media(max-width:600px){

h1{
    font-size:40px;
}

button{
    font-size:18px;
    padding:15px 22px;
}

.buttons{
    gap:20px;
}

.resultText{
    font-size:40px;
}

}

</style>

</head>


<body>


<div id="startScreen">

<button id="startBtn">
 Touch me ayem
</button>

</div>



<audio id="music" loop>

<source src="perfect.mp3" type="audio/mpeg">

</audio>




<div id="mainContent">

<h1>
Aliyem beni affet ❤️
</h1>


<div class="buttons">

<button id="yes">
Affediyorum aşkım 💚
</button>


<button id="no">
Hayır 😒
</button>

</div>

</div>



<div id="result">

<div class="resultText">

❤️ Seni Çok Seviyorum Aliye ❤️

<br>

<br>

    <span style="font-size:22px;">

    Seni kırdığım anlar için özür dilerim.<br>

    Sen benim için çok değerlisin.<br>

    İyi ki hayatımdasın ❤️

    </span>

</div>

</div>




<script>


const startBtn=document.getElementById("startBtn");
const startScreen=document.getElementById("startScreen");
const mainContent=document.getElementById("mainContent");
const music=document.getElementById("music");



startBtn.onclick=function(){

    music.play();

    startScreen.style.display="none";

    mainContent.style.display="flex";

};





const noBtn=document.getElementById("no");



function moveNo(){

    let width=noBtn.offsetWidth;
    let height=noBtn.offsetHeight;


    let x=Math.random()*(window.innerWidth-width-20)+10;
    let y=Math.random()*(window.innerHeight-height-20)+10;


    noBtn.style.position="fixed";

    noBtn.style.left=x+"px";

    noBtn.style.top=y+"px";

}



noBtn.addEventListener("mouseover",moveNo);


noBtn.addEventListener("touchstart",function(e){

    e.preventDefault();

    moveNo();

});





const yesBtn=document.getElementById("yes");



yesBtn.onclick=function(){


    mainContent.style.display="none";


    document.getElementById("result").style.display="flex";



    for(let i=0;i<100;i++){


        let heart=document.createElement("div");


        heart.className="heart";

        heart.innerHTML="❤️";


        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=(20+Math.random()*40)+"px";


        document.body.appendChild(heart);



        setTimeout(()=>{

            heart.remove();

        },6000);

    }

};





setInterval(()=>{


let heart=document.createElement("div");


heart.className="heart";


heart.innerHTML="❤️";


heart.style.left=Math.random()*100+"vw";


document.body.appendChild(heart);



setTimeout(()=>{

heart.remove();

},6000);



},400);



</script>


</body>
</html>
